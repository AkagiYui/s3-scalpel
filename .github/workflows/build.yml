name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build (macOS)
        if: runner.os == 'macOS'
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-mmacosx-version-min=10.15"
          CGO_LDFLAGS: "-mmacosx-version-min=10.15"
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        run: |
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/s3-scalpel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        env:
          GOOS: windows
          CGO_ENABLED: 0
          GOARCH: amd64
        run: |
          wails3 generate syso -arch amd64 -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_amd64.syso
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o bin/s3-scalpel.exe

      - uses: actions/upload-artifact@v4
        with:
          name: s3-scalpel-${{ matrix.os }}
          path: bin/
